<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Eval Results - Product Analysis</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="container">
    <h1>Eval Results</h1>
    <nav class="top-nav">
      <a class="top-nav-link" href="./index.html">Tests</a>
      <a class="top-nav-link top-nav-link-active" href="./products.html">Product Analysis</a>
    </nav>

    <p class="muted">Grouped by tags that start with <code>product:</code>.</p>

    <section class="controls">
      <label>
        Sort by
        <select id="productSortBy"></select>
      </label>
      <label>
        Order
        <select id="productSortDir">
          <option value="asc">A to Z / low to high</option>
          <option value="desc">Z to A / high to low</option>
        </select>
      </label>
      <button id="productClearFiltersBtn" type="button">Clean filters</button>
    </section>

    <p id="statusLine" class="muted"></p>

    <table id="productMetricsTable">
      <thead></thead>
      <tbody></tbody>
    </table>
  </main>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
  <script src="./app.js"></script>
</body>
</html>
